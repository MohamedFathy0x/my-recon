name: Spreaker - The Rotation (Nuclei scanner)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  hunter-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        # التقسيم على سيرفرين فقط
        shard: [1, 2]
        total_shards: [2]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تجهيز بيئة Go
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      # 2. التثبيت من المصدر
      - name: Install Nuclei from Source (Full Build)
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl parallel libpcap-dev bind9-host
          
          echo "🏗️ Building Nuclei from Source..."
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          echo "✅ Updating Templates..."
          nuclei -update-templates
          
          echo "✅ Nuclei Version:"
          nuclei -version

      # 3. العقل المدبر: تحديد نوع الفحص
      - name: Determine Daily Combat Mode
        id: mode
        run: |
          # بنجيب رقم اليوم في السنة
          DAY_OF_YEAR=$(date +%-j)
          
          # باقي القسمة على 3 فقط (عشان عندنا 3 أنواع بس)
          ROTATION=$(( $DAY_OF_YEAR % 3 ))
          
          if [ "$ROTATION" -eq 0 ]; then
            echo "TODAY_SEVERITY=critical" >> $GITHUB_ENV
            echo "MODE_MSG=🔥 DOOMSDAY (CRITICAL)" >> $GITHUB_ENV
          elif [ "$ROTATION" -eq 1 ]; then
            echo "TODAY_SEVERITY=high" >> $GITHUB_ENV
            echo "MODE_MSG=⚔️ HEAVY ASSAULT (HIGH)" >> $GITHUB_ENV
          else
            echo "TODAY_SEVERITY=medium" >> $GITHUB_ENV
            echo "MODE_MSG=👀 DEEP SCAN (MEDIUM)" >> $GITHUB_ENV
          fi
          
          echo "📅 Day of Year: $DAY_OF_YEAR"

      # 4. الفحص المتغير (مقسم على السيرفرين)
      - name: Split & Rotating Attack (Unit ${{ matrix.shard }})
        run: |
          echo "🚀 Starting Mission: ${{ env.MODE_MSG }}"
          
          if [ ! -f spreaker_previous.txt ]; then
            echo "⚠️ No targets found."
            exit 0
          fi

          TOTAL_LINES=$(wc -l < spreaker_previous.txt)
          LINES_PER_SHARD=$(( ($TOTAL_LINES + ${{ matrix.total_shards }} - 1) / ${{ matrix.total_shards }} ))
          START_LINE=$(( (${{ matrix.shard }} - 1) * $LINES_PER_SHARD + 1 ))
          
          tail -n +$START_LINE spreaker_previous.txt | head -n $LINES_PER_SHARD > target_shard.txt
          
          DOMAIN_COUNT=$(wc -l < target_shard.txt)
          echo "🐜 Unit #${{ matrix.shard }} attacking $DOMAIN_COUNT targets..."

          # --- الفحص ---
          nuclei -l target_shard.txt \
            -rl 5 -bs 2 -c 2 \
            -severity ${{ env.TODAY_SEVERITY }} \
            -timeout 6 \
            -o findings.txt \
            -silent || true

          if [ -s findings.txt ]; then
            echo "🔥 Vulnerabilities Found!"
          fi

      # 5. التبليغ
      - name: Send Report
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s findings.txt ]; then
            COUNT=$(wc -l < findings.txt)
            
            MSG="🔄 *Spreaker Hit! (#${{ matrix.shard }})*
            📅 Mode: *${{ env.MODE_MSG }}*
            🎯 Targets: $(wc -l < target_shard.txt)
            💣 Found: ${COUNT} Vulnerabilities
            
            📂 *Report attached.*"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
              -F chat_id="$TG_CHAT" \
              -F document=@findings.txt \
              -F caption="📄 ${{ env.TODAY_SEVERITY }} Spreaker Report - Unit ${{ matrix.shard }}"
          else
            echo "✅ Unit ${{ matrix.shard }} Clean."
          fi
