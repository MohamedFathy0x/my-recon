# اسم الورك فلو: "الروبوت الأقوى" V3
name: V3 - Smart Recon & Vulnerability Hunter

on:
  # 1. التشغيل الأوتوماتيكي (كل 12 ساعة)
  schedule:
    # (في الدقيقة 0، كل 12 ساعة - زي ما طلبت)
    - cron: '0 */12 * * *'
    
  # 2. التشغيل اليدوي (للفحص الفوري)
  workflow_dispatch:
    inputs:
      DOMAIN:
        description: 'Target Domain (for manual run)'
        required: true
        default: 'testphp.vulnweb.com' # هدف تجريبي آمن

jobs:
  hunt-job:
    runs-on: ubuntu-latest
    
    # هذه الأذونات ضرورية عشان الروبوت "يحفظ ذاكرته" (يعمل git push)
    permissions:
      contents: write
      
    steps:
      # --- الخطوة 1: تجهيز الأدوات ---
      - name: Install Tools (Subfinder, httpx, Nuclei)
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          # بننقلهم لمكان الروبوت يشوفه
          sudo cp /home/runner/go/bin/* /usr/local/bin

      # --- الخطوة 2: سحب "الذاكرة" القديمة ---
      # الروبوت بيسحب الملفات القديمة من الـ Repo عشان يفتكر
      - name: Checkout Repository (to get "previous_subdomains.txt")
        uses: actions/checkout@v4

      # --- الخطوة 3: تحديد الهدف ---
      - name: Set Target Domain
        id: target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET=${{ github.event.inputs.DOMAIN }}" >> $GITHUB_OUTPUT
          else
            # !!! ده الهدف الأوتوماتيك (غيره للهدف اللي إنت عايزه) !!!
            # استخدم هدف آمن زي example.com لو بتجرب
            [cite_start]echo "TARGET=example.com" >> $GITHUB_OUTPUT [cite: 36]
          fi
          echo "TARGET_DOMAIN=${{ steps.target.outputs.TARGET }}" >> $GITHUB_ENV

      # --- الخطوة 4: تشغيل Subfinder (القوي بـ -all والمفاتيح) ---
      - name: Run Subfinder (Full Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          echo "Running Subfinder on ${{ env.TARGET_DOMAIN }}..."
          subfinder -d ${{ env.TARGET_DOMAIN }} -all -o all_subdomains.txt
          echo "Found $(wc -l < all_subdomains.txt) total subdomains."

      # --- الخطوة 5: الفلترة الحية (httpx) ---
      - name: Filter Live Subdomains (httpx)
        run: |
          echo "Filtering live subdomains..."
          httpx -l all_subdomains.txt -o live_subdomains.txt
          echo "Found $(wc -l < live_subdomains.txt) live subdomains."

      # --- الخطوة 6: "الذاكرة" (إيجاد الدومينات الجديدة فقط) ---
      - name: Compare with Previous Results (Find NEW targets only)
        id: diff
        run: |
          # بنعمل ملف فاضي لو الذاكرة مش موجودة
          touch previous_live_subdomains.txt
          
          # بنرتب الملفين عشان نقارنهم
          sort live_subdomains.txt > current_live.txt
          sort previous_live_subdomains.txt > previous_live.txt
          
          # الأمر "comm" العبقري: بيجيب "الدومينات الجديدة بس"
          [cite_start]comm -23 current_live.txt previous_live.txt > new_targets.txt [cite: 8]
          
          echo "NEW_TARGETS_COUNT=$(wc -l < new_targets.txt)" >> $GITHUB_ENV
          echo "Total live targets: $(wc -l < current_live.txt)"
          echo "New targets to scan: $(wc -l < new_targets.txt)"

      # --- الخطوة 7: تشغيل Nuclei (على الأهداف الجديدة فقط) ---
      - name: Run Nuclei (on NEW targets only)
        run: |
          if [ ${{ env.NEW_TARGETS_COUNT }} -gt 0 ]; then
            echo "Running Nuclei on ${{ env.NEW_TARGETS_COUNT }} new targets..."
            nuclei -l new_targets.txt -s critical,high,medium -o nuclei_results.txt
            echo "VULNS_FOUND=$(wc -l < nuclei_results.txt)" >> $GITHUB_ENV
          else
            echo "No new targets to scan. Skipping Nuclei."
            echo "VULNS_FOUND=0" >> $GITHUB_ENV
          fi

      # --- الخطوة 8: "الإنذار الفوري" (لكل ثغرة) ---
      - name: Send Individual Vulnerabilities to Telegram
        if: env.VULNS_FOUND > 0
        run: |
          echo "Sending ${{ env.VULNS_FOUND }} vulnerabilities to Telegram..."
          # اللفة العبقرية: بيبعت رسالة لكل سطر في ملف النتايج
          [cite_start]while IFS= read -r vuln; do [cite: 45]
            MESSAGE="🚨 VULNERABILITY ALERT 🚨
            **Target:** ${{ env.TARGET_DOMAIN }}
            **Finding:**
            \`\`\`
            $vuln
            \`\`\`"
            
            # بنستخدم curl لإرسال الرسالة (بنفس الأسرار بتاعتنا)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
            
            [cite_start]sleep 1 # بنستنى ثانية عشان تيليجرام ميعملناش بلوك [cite: 47]
          [cite_start]done < nuclei_results.txt [cite: 47]

      # --- الخطوة 9: إرسال "تقرير الملخص" ---
      - name: Send Summary Report
        run: |
          if [ ${{ env.VULNS_FOUND }} -gt 0 ]; then
            SUMMARY_MSG="✅ **Scan Complete (V3)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **🚨 Found ${{ env.VULNS_FOUND }} new vulnerabilities!** (Sent individually)"
          else
            SUMMARY_MSG="✅ **Scan Complete (V3)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **New Live Targets:** ${{ env.NEW_TARGETS_COUNT }}
            **No new vulnerabilities found.** Keep hunting!"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$SUMMARY_MSG"

      # --- الخطوة 10: "حفظ الذاكرة" (للمرة الجاية) ---
      - name: Update Previous Results (Save Memory)
        run: |
          # بنمسح الذاكرة القديمة
          rm -f previous_live_subdomains.txt
          # بنحفظ الذاكرة الجديدة (اللي فيها كل الدومينات الحية)
          mv live_subdomains.txt previous_live_subdomains.txt
          echo "Memory updated for next run."

      # --- الخطوة 11: حفظ الذاكرة في الـ Repo ---
      # دي أهم خطوة عشان "نفتكر" المرة الجاية
      - name: Commit and Push Memory File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_live_subdomains.txt
          # بنشوف لو فيه تغييرات
          [cite_start]if git diff --staged --quiet; then [cite: 29]
            [cite_start]echo "No changes to commit. Memory is up-to-date." [cite: 30]
          else
            git commit -m "V3 Bot: Update subdomain memory file"
            [cite_start]git push [cite: 30]
          fi
