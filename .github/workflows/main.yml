# اسم الورك فلو: "الروبوت الأقوى" V5 (النموذج النهائي)
name: V5 - Dual-Strategy Hunter (Deep, Light, Visual, JS)

on:
  # 1. التشغيل الأوتوماتيكي (كل 12 ساعة)
  schedule:
    - cron: '0 */12 * * *'
    
  # 2. التشغيل اليدوي (للفحص الفوري)
  workflow_dispatch:
    inputs:
      DOMAIN:
        description: 'Target Domain (for manual run)'
        required: true
        default: 'testphp.vulnweb.com'

jobs:
  hunt-job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # ضروري عشان "يحفظ الذاكرة"
      
    steps:
      # --- الخطوة 1: تجهيز الأدوات (الروبوت كامل) ---
      - name: Install Tools (All V5 Tools)
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install -v github.com/jaeles-project/gospider@latest
          go install -v github.com/sensepost/gowitness@latest
          sudo cp /home/runner/go/bin/* /usr/local/bin

      # --- الخطوة 2: سحب "الذاكرة" القديمة ---
      - name: Checkout Repository (to get "previous_live_subdomains.txt")
        uses: actions/checkout@v4

      # --- الخطوة 3: تحديد الهدف ---
      - name: Set Target Domain
  id: target
  run: |
    # بنحدد الدومين الأول في متغير
    if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
      T_DOMAIN="${{ github.event.inputs.DOMAIN }}"
    else
      # !!! ده الهدف الأوتوماتيك (غيره للهدف اللي إنت عايزه) !!!
      T_DOMAIN="example.com"
    fi

    # بنحفظ الدومين "للخطوات الجاية" و "للملخص"
    echo "TARGET=$T_DOMAIN" >> $GITHUB_OUTPUT
    echo "TARGET_DOMAIN=$T_DOMAIN" >> $GITHUB_ENV
  
      # --- الخطوة 4: تشغيل Subfinder (القوي بـ -all والمفاتيح) ---
      - name: Run Subfinder (Full Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          subfinder -d ${{ env.TARGET_DOMAIN }} -all -o all_subdomains.txt
          echo "Found $(wc -l < all_subdomains.txt) total subdomains."

      # --- الخطوة 5: الفلترة الحية (httpx) ---
      - name: Filter Live Subdomains (httpx)
        run: |
          httpx -l all_subdomains.txt -o live_subdomains.txt
          echo "Found $(wc -l < live_subdomains.txt) live subdomains."

      # --- الخطوة 6: "الذاكرة" (تقسيم الأهداف لـ "جديد" و "قديم") ---
      - name: Compare with Previous Results (Find NEW vs. OLD)
        id: diff
        run: |
          touch previous_live_subdomains.txt # بنعمل ملف فاضي لو الذاكرة مش موجودة
          sort live_subdomains.txt > current_live.txt
          sort previous_live_subdomains.txt > previous_live.txt
          
          # استراتيجية "الجديد": الأهداف الجديدة بس
          comm -23 current_live.txt previous_live.txt > new_targets.txt
          # استراتيجية "القديم": الأهداف القديمة بس (اللي لسه عايشة)
          comm -12 current_live.txt previous_live.txt > old_targets.txt
          
          echo "NEW_TARGETS_COUNT=$(wc -l < new_targets.txt)" >> $GITHUB_ENV
          echo "OLD_TARGETS_COUNT=$(wc -l < old_targets.txt)" >> $GITHUB_ENV
          echo "New targets to scan: $(cat new_targets.txt | wc -l)"
          echo "Old targets to monitor: $(cat old_targets.txt | wc -l)"

      # --- الخطوة 7: استراتيجية "الجديد" (الفحص العميق) ---
      - name: Run Deep Scan (Nuclei, gowitness, gospider) on NEW Targets
        if: env.NEW_TARGETS_COUNT > 0
        run: |
          echo "Running DEEP SCAN on ${{ env.NEW_TARGETS_COUNT }} new targets..."
          # 1. Nuclei (العميق)
          nuclei -l new_targets.txt -s critical,high,medium -o nuclei_new_results.txt
          # 2. gowitness (العيون)
          gowitness file -f new_targets.txt -d gowitness_output --disable-db
          # 3. gospider (الآذان)
          gospider -S new_targets.txt -o gospider_output
          echo "Deep scan finished."

      # --- الخطوة 8: استراتيجية "القديم" (الفحص الخفيف) ---
      - name: Run Light Scan (Nuclei Tags) on OLD Targets
        if: env.OLD_TARGETS_COUNT > 0
        run: |
          echo "Running LIGHT SCAN on ${{ env.OLD_TARGETS_COUNT }} old targets..."
          # Nuclei (الخفيف) - بندور على أخطر حاجة بس
          nuclei -l old_targets.txt -tags takeover,exposure,misconfig,cve -s critical,high -o nuclei_old_results.txt
          echo "Light scan finished."

      # --- الخطوة 9: تجميع النتايج (عشان الإنذار الفوري) ---
      - name: Combine Nuclei Results
        run: |
          touch nuclei_new_results.txt nuclei_old_results.txt # بنعملهم لو فاضيين
          cat nuclei_new_results.txt nuclei_old_results.txt > final_nuclei_results.txt
          echo "VULNS_FOUND=$(wc -l < final_nuclei_results.txt)" >> $GITHUB_ENV

      # --- الخطوة 10: "الإنذار الفوري" (لكل ثغرة) ---
      - name: Send Individual Nuclei Alerts to Telegram
        if: env.VULNS_FOUND > 0
        run: |
          echo "Sending ${{ env.VULNS_FOUND }} total vulnerabilities to Telegram..."
          while IFS= read -r vuln; do
            MESSAGE="🚨 VULNERABILITY ALERT 🚨
            **Target:** ${{ env.TARGET_DOMAIN }}
            **Finding:**
            \`\`\`
            $vuln
            \`\`\`"
            
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
            sleep 1
          done < final_nuclei_results.txt

      # --- الخطوة 11: أرشفة النتايج (السكرين شوتس والـ JS) ---
      - name: Upload Recon Artifacts (Screenshots & JS Maps)
        if: env.NEW_TARGETS_COUNT > 0
        uses: actions/upload-artifact@v4
        with:
          name: V5-Recon-Artifacts
          path: |
            gowitness_output/screenshots/
            gospider_output/
          retention-days: 7

      # --- الخطوة 12: إرسال "تقرير الملخص" ---
      - name: Send Summary Report
        run: |
          # بنجهز الملخص
          if [ ${{ env.VULNS_FOUND }} -gt 0 ]; then
            SUMMARY_MSG="✅ **Scan Complete (V5)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **New Live Targets:** ${{ env.NEW_TARGETS_COUNT }}
            **Monitored Old Targets:** ${{ env.OLD_TARGETS_COUNT }}
            **🚨 Found ${{ env.VULNS_FOUND }} total vulnerabilities!** (Sent individually)"
          else
            SUMMARY_MSG="✅ **Scan Complete (V5)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **New Live Targets:** ${{ env.NEW_TARGETS_COUNT }}
            **Monitored Old Targets:** ${{ env.OLD_TARGETS_COUNT }}
            **No new vulnerabilities found.**"
          fi
          
          # بنضيف معلومة الأرشيف لو موجود
          if [ ${{ env.NEW_TARGETS_COUNT }} -gt 0 ]; then
            SUMMARY_MSG="$SUMMARY_MSG

            **NEW (Manual Recon):** Screenshots & JS Maps are ready. Go to GitHub Actions to download 'V5-Recon-Artifacts'."
          fi
          
          # بنبعت الملخص
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$SUMMARY_MSG"

      # --- الخطوة 13: "حفظ الذاكرة" (للمرة الجاية) ---
      - name: Update Previous Results (Save Memory)
        run: |
          rm -f previous_live_subdomains.txt
          mv current_live.txt previous_live_subdomains.txt
          echo "Memory updated for next run."

      # --- الخطوة 14: حفظ الذاكرة في الـ Repo ---
      - name: Commit and Push Memory File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_live_subdomains.txt
          if git diff --staged --quiet; then
            echo "No changes to commit. Memory is up-to-date."
          else
            git commit -m "V5 Bot: Update subdomain memory file"
            git push
          fi
