name: V40 - The Radar (Domain Monitor)

on:
  schedule:
    - cron: '0 0 * * *' # يعمل يومياً منتصف الليل بتوقيت جرينتش
  workflow_dispatch:    # للتشغيل اليدوي وقت ما تحب

jobs:
  radar-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # صلاحية أساسية لتحديث الذاكرة على جيت هب

    steps:
      # 1. سحب مساحة العمل
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تثبيت أدوات الصيد (Subfinder & Httpx)
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y jq wget unzip
          
          echo "🛠️ Installing Subfinder..."
          wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.6/subfinder_2.6.6_linux_amd64.zip
          unzip -o -q subfinder_2.6.6_linux_amd64.zip
          sudo mv subfinder /usr/local/bin/
          
          echo "🛠️ Installing Httpx..."
          wget -q https://github.com/projectdiscovery/httpx/releases/download/v1.6.0/httpx_1.6.0_linux_amd64.zip
          unzip -o -q httpx_1.6.0_linux_amd64.zip
          sudo mv httpx /usr/local/bin/
          rm *.zip

      # 3. تحديد الأهداف الأساسية (Scope)
      - name: Define Target Scope
        run: |
          cat <<EOF > scope.txt
          sdworx.com
          flexincomeplan.com
          myworkandme.com
          huapii.com
          sdworx.be
          sdworx.cz
          sdworx.dk
          sdworx.de
          sdworx.es
          sdworx.fr
          sdworx.hr
          sdworx.ie
          sdworx.it
          sdworx.lu
          sdworx.hu
          sdworx.nl
          sdworx.no
          sdworx.at
          sdworx.pl
          sdworx.ro
          sdworx.ch
          sdworx.si
          sdworx.rs
          sdworx.fi
          sdworx.se
          sdworx.co.uk
          EOF
          echo "✅ Scope loaded. Base domains: $(wc -l < scope.txt)"

      # 4. تجميع النطاقات الفرعية (مع استخدام المفاتيح)
      - name: Subdomain Enumeration
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          echo "🔍 Running Subfinder..."
          subfinder -dL scope.txt -all -silent -o raw_subs.txt
          
          # دمج الأساسي مع الفرعي وإزالة التكرار
          cat scope.txt raw_subs.txt | sort -u > unique_subs.txt
          echo "🎯 Found $(wc -l < unique_subs.txt) unique domains."

      # 5. الفحص الحي (مع احترام حد 5 طلبات/ثانية)
      - name: Check Alive Domains (Rate Limited)
        run: |
          echo "⚡ Checking live status (Strict 5 req/sec)..."
          httpx -l unique_subs.txt -silent -rl 5 -o current_live.txt
          sort -u current_live.txt -o current_live.txt
          echo "✅ Total Alive Domains: $(wc -l < current_live.txt)"

      # 6. استخراج الأهداف الجديدة فقط
      - name: Diff Logic (Extract New)
        run: |
          touch previous_live.txt
          sort previous_live.txt > old_sorted.txt
          
          # استخراج السطور الموجودة في الحالي ومش موجودة في القديم
          comm -23 current_live.txt old_sorted.txt > new_domains.txt
          
          NEW_COUNT=$(wc -l < new_domains.txt)
          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_ENV
          echo "🔥 New domains discovered: $NEW_COUNT"

      # 7. إرسال التقرير على تليجرام
      - name: Send Telegram Alert
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ env.NEW_COUNT }}" -gt "0" ]; then
            # تجهيز الرسالة بشكل آمن
            echo -e "🌐 *SD Worx Radar Hit!*\n🎯 New Alive Domains: ${{ env.NEW_COUNT }}\n" > tg_msg.txt
            
            # إضافة أول 15 دومين لتجنب حجم الرسالة الضخم
            head -n 15 new_domains.txt | while read domain; do
              echo "✅ \`$domain\`" >> tg_msg.txt
            done
            
            if [ "${{ env.NEW_COUNT }}" -gt "15" ]; then
              echo -e "\n... and more! Check GitHub Repo." >> tg_msg.txt
            fi
            
            # إرسال الرسالة
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              -data-urlencode text@tg_msg.txt \
              -d parse_mode="Markdown"
          else
            echo -e "✅ *SD Worx Radar Finished.*\nStatus: Clean (No new domains today)." > tg_msg.txt
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              -data-urlencode text@tg_msg.txt \
              -d parse_mode="Markdown"
          fi

      # 8. حفظ النتائج في الذاكرة للغد
      - name: Update Radar Memory
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "radar-bot@noreply.com"
          
          # دمج أي تغييرات خارجية لتجنب الـ Conflicts
          git pull origin main --rebase || true
          
          mv current_live.txt previous_live.txt
          
          git add previous_live.txt
          
          # التحقق إذا كان في تغيير فعلي قبل عمل Commit
          if git diff --staged --quiet; then
            echo "No memory changes to commit."
          else
            git commit -m "Radar Update: Baseline adjusted"
            git push
          fi
