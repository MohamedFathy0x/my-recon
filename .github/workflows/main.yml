name: V10 - The Masterpiece (Stable & Smart)

on:
  schedule:
    - cron: '0 */12 * * *' # كل 12 ساعة
  workflow_dispatch:
    inputs:
      DOMAIN:
        description: 'Target Domain'
        required: true
        default: 'testphp.vulnweb.com'

jobs:
  hunt-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. التثبيت الذكي (Official Script)
      # بيحل كل مشاكل التثبيت السابقة
      - name: Install Tools (Smart Way)
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils jq libpcap-dev
          
          # تثبيت الأدوات بالسكربت الرسمي لضمان آخر نسخة
          curl -s https://projectdiscovery.io/install.sh | bash -s subfinder
          curl -s https://projectdiscovery.io/install.sh | bash -s httpx
          curl -s https://projectdiscovery.io/install.sh | bash -s nuclei
          
          # نقل الأدوات للمسار العام عشان تشتغل من أي مكان
          # السكربت بينزلهم في .pdtm/go/bin عادة
          sudo mv /home/runner/.pdtm/go/bin/* /usr/local/bin/ 2>/dev/null || true
          
          echo "Tools installed successfully!"

      # 2. تحديد الهدف
      - name: Set Target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET_DOMAIN=${{ github.event.inputs.DOMAIN }}" >> $GITHUB_ENV
          else
            echo "TARGET_DOMAIN=testphp.vulnweb.com" >> $GITHUB_ENV
          fi

      # 3. الاستطلاع (Subfinder)
      - name: Recon (Subfinder)
        run: |
          # -silent: عشان الـ Logs تبقى نظيفة
          subfinder -d ${{ env.TARGET_DOMAIN }} -all -silent -o all_subs.txt
          echo "${{ env.TARGET_DOMAIN }}" >> all_subs.txt

      # 4. الفلترة (Httpx)
      - name: Filter (Httpx)
        run: |
          httpx -l all_subs.txt -silent -o live_targets.txt
          echo "Live Targets Found: $(wc -l < live_targets.txt)"

      # 5. الهجوم الذكي (Nuclei JSON Mode)
      - name: Scan (Nuclei)
        run: |
          # تحميل القوالب ضروري جداً
          nuclei -update-templates
          
          # -je: Json Export (عشان نعرف نقراها بـ jq)
          # -s: Severity (Critical, High, Medium)
          # شلت -dast عشان نضمن الاستقرار
          
          nuclei -l live_targets.txt \
            -s critical,high,medium \
            -rl 50 -bs 5 -c 10 -timeout 10 \
            -je nuclei_results.json

      # 6. التحليل والتبليغ (Smart Alerting)
      - name: Alert (Telegram via JQ)
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # نتأكد إن الملف موجود وفيه داتا
          if [ -s nuclei_results.json ]; then
            echo "Vulnerabilities found! Processing..."
            
            # نقرأ ملف الـ JSON سطر سطر
            cat nuclei_results.json | while read line; do
              # استخراج البيانات بدقة
              NAME=$(echo $line | jq -r '.info.name')
              SEVERITY=$(echo $line | jq -r '.info.severity')
              URL=$(echo $line | jq -r '.matched-at')
              
              # تجهيز الرسالة
              MSG="🔥 **VULN FOUND!**
              🎯 Target: ${{ env.TARGET_DOMAIN }}
              🐛 Bug: $NAME
              ⚠️ Severity: $SEVERITY
              🔗 URL: \`$URL\`"
              
              # الإرسال
              curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              -d text="$MSG" \
              -d parse_mode="Markdown"
              
              sleep 1
            done
          else
            echo "✅ Clean Scan. No critical/high bugs found."
          fi
