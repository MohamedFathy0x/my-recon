name: V40 - The Ultimate Radar (Perfected)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  radar-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Hunting Arsenal
        run: |
          sudo apt-get update && sudo apt-get install -y jq wget unzip curl
          
          wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.6/subfinder_2.6.6_linux_amd64.zip
          unzip -o -q subfinder_2.6.6_linux_amd64.zip
          sudo mv subfinder /usr/local/bin/
          
          wget -q https://github.com/projectdiscovery/httpx/releases/download/v1.6.0/httpx_1.6.0_linux_amd64.zip
          unzip -o -q httpx_1.6.0_linux_amd64.zip
          sudo mv httpx /usr/local/bin/
          
          go install github.com/tomnomnom/assetfinder@latest
          sudo cp ~/go/bin/assetfinder /usr/local/bin/
          
          rm *.zip

      - name: Define Target Scope
        run: |
          cat <<EOF > scope.txt
          sdworx.com
          flexincomeplan.com
          myworkandme.com
          huapii.com
          sdworx.be
          sdworx.cz
          sdworx.dk
          sdworx.de
          sdworx.es
          sdworx.fr
          sdworx.hr
          sdworx.ie
          sdworx.it
          sdworx.lu
          sdworx.hu
          sdworx.nl
          sdworx.no
          sdworx.at
          sdworx.pl
          sdworx.ro
          sdworx.ch
          sdworx.si
          sdworx.rs
          sdworx.fi
          sdworx.se
          sdworx.co.uk
          EOF

      - name: Triple-Threat Subdomain Enumeration
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          subfinder -dL scope.txt -all -silent -o sub1.txt || true
          cat scope.txt | assetfinder --subs-only > sub2.txt || true
          
          cat scope.txt | while read domain; do
            curl -s "https://crt.sh/?q=%25.$domain&output=json" | jq -r '.[].name_value' 2>/dev/null >> sub3.txt || true
          done
          
          # إزالة علامات النجمة (Wildcards) وتوحيد الحروف وإزالة التكرار
          cat scope.txt sub1.txt sub2.txt sub3.txt | tr '[:upper:]' '[:lower:]' | sed 's/\*\.//g' | sort -u > unique_subs.txt

      - name: Check Alive Domains (Rate Limited & Safe)
        run: |
          # 5 طلبات في الثانية + 5 مسارات فقط (مستحيل يسبب حظر)
          httpx -l unique_subs.txt -silent -rl 5 -t 5 -o current_live.txt
          sort -u current_live.txt -o current_live.txt

      - name: Diff Logic (Extract New)
        run: |
          touch previous_live.txt
          sort previous_live.txt > old_sorted.txt
          
          comm -23 current_live.txt old_sorted.txt > new_domains.txt
          
          NEW_COUNT=$(wc -l < new_domains.txt)
          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_ENV

      - name: Send Telegram Alert (Bulletproof)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ env.NEW_COUNT }}" -gt "0" ]; then
            DOMAINS_LIST=$(head -n 15 new_domains.txt | sed 's/^/✅ `/; s/$/`/')
            
            if [ "${{ env.NEW_COUNT }}" -gt "15" ]; then
              DOMAINS_LIST="$DOMAINS_LIST
              
... and more! Check GitHub Repo."
            fi
            
            MSG=$(cat <<EOF
🌐 *SD Worx Radar Hit!*
🎯 New Alive Domains: ${{ env.NEW_COUNT }}

$DOMAINS_LIST
EOF
)
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
          else
            MSG=$(cat <<EOF
✅ *SD Worx Radar Finished.*
Status: Clean (No new domains today).
EOF
)
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
          fi

      - name: Update Radar Memory
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "radar-bot@noreply.com"
          
          git pull origin main --rebase || true
          
          mv current_live.txt previous_live.txt
          
          git add previous_live.txt
          
          if git diff --staged --quiet; then
            echo "No memory changes"
          else
            git commit -m "Radar Update: Baseline adjusted"
            git push
          fi
