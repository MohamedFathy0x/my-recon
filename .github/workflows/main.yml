name: V9.2 - Smart Hunter (Stable & Fixed)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      DOMAIN:
        description: 'Target Domain'
        required: true
        default: 'testphp.vulnweb.com'

jobs:
  hunt-job:
    runs-on: ubuntu-latest
    
    steps:
      # 1. التثبيت اليدوي المضمون (بديل للرابط الخربان)
      - name: Install Tools (Manual & Stable)
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils jq unzip wget

          # تثبيت Subfinder
          wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.6/subfinder_2.6.6_linux_amd64.zip
          unzip -q subfinder_2.6.6_linux_amd64.zip
          sudo mv subfinder /usr/local/bin/

          # تثبيت Httpx
          wget -q https://github.com/projectdiscovery/httpx/releases/download/v1.6.9/httpx_1.6.9_linux_amd64.zip
          unzip -q httpx_1.6.9_linux_amd64.zip
          sudo mv httpx /usr/local/bin/

          # تثبيت Nuclei
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.3.6/nuclei_3.3.6_linux_amd64.zip
          unzip -q nuclei_3.3.6_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/

          # تنظيف
          rm *.zip
          echo "All tools installed successfully!"

      # 2. تحديد الهدف
      - name: Set Target
        id: target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.DOMAIN }}"
          else
            TARGET="example.com" # <--- غير ده لهدفك
          fi
          echo "TARGET_DOMAIN=$TARGET" >> $GITHUB_ENV

      # 3. الاستطلاع (Subfinder)
      - name: Recon (Subfinder)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          subfinder -d ${{ env.TARGET_DOMAIN }} -all -silent -o all_subs.txt
          echo "${{ env.TARGET_DOMAIN }}" >> all_subs.txt

      # 4. الفلترة (httpx)
      - name: Filter (httpx)
        run: |
          httpx -l all_subs.txt -silent -o live_targets.txt
          echo "Live targets count: $(wc -l < live_targets.txt)"

      # 5. الهجوم الذكي (Nuclei + DAST)
      - name: Scan (Nuclei Smart Mode)
        run: |
          nuclei -update-templates
          
          nuclei -l live_targets.txt \
            -s critical,high,medium \
            -dast \
            -rl 50 -bs 5 -c 10 \
            -retries 2 \
            -je nuclei_results.json

      # 6. التحليل والتبليغ
      - name: Alert (Telegram)
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s nuclei_results.json ]; then
            cat nuclei_results.json | while read line; do
              
              NAME=$(echo $line | jq -r '.info.name')
              SEVERITY=$(echo $line | jq -r '.info.severity')
              URL=$(echo $line | jq -r '.matched-at')
              
              MSG="🔥 **VULNERABILITY FOUND!**
              
              **Target:** ${{ env.TARGET_DOMAIN }}
              **Bug:** $NAME
              **Severity:** $SEVERITY
              **URL:** \`$URL\`"
              
              curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              -d text="$MSG" \
              -d parse_mode="Markdown"
              
              sleep 1
            done
          else
            echo "No vulnerabilities found. Job done silently."
          fi
