# اسم الورك فلو: "الروبوت الأقوى" V4.1 (بلاصلاح gowitness)
name: V4 - Professional Hunter (Recon + Visual + JS + Scan)

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      DOMAIN:
        description: 'Target Domain (for manual run)'
        required: true
        default: 'testphp.vulnweb.com'

jobs:
  hunt-job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      # --- الخطوة 1: تجهيز الأدوات (مع التصليح) ---
      - name: Install Tools (All V4 Tools)
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install -v github.com/jaeles-project/gospider@latest
          
          # --- (ده سطر التصليح) ---
          # شيلنا /cmd/gowitness الغلط
          go install -v github.com/sensepost/gowitness@latest
          # --- (نهاية سطر التصليح) ---
          
          sudo cp /home/runner/go/bin/* /usr/local/bin

      # --- الخطوة 2: سحب "الذاكرة" القديمة ---
      - name: Checkout Repository (to get "previous_live_subdomains.txt")
        uses: actions/checkout@v4

      # --- الخطوة 3: تحديد الهدف ---
      - name: Set Target Domain
        id: target
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET=${{ github.event.inputs.DOMAIN }}" >> $GITHUB_OUTPUT
          else
            echo "TARGET=example.com" >> $GITHUB_OUTPUT
          fi
          echo "TARGET_DOMAIN=${{ steps.target.outputs.TARGET }}" >> $GITHUB_ENV

      # --- الخطوة 4: تشغيل Subfinder (القوي بـ -all والمفاتيح) ---
      - name: Run Subfinder (Full Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          echo "Running Subfinder on ${{ env.TARGET_DOMAIN }}..."
          subfinder -d ${{ env.TARGET_DOMAIN }} -all -o all_subdomains.txt
          echo "Found $(wc -l < all_subdomains.txt) total subdomains."

      # --- الخطوة 5: الفلترة الحية (httpx) ---
      - name: Filter Live Subdomains (httpx)
        run: |
          echo "Filtering live subdomains..."
          httpx -l all_subdomains.txt -o live_subdomains.txt
          echo "Found $(wc -l < live_subdomains.txt) live subdomains."

      # --- الخطوة 6: "الذاكرة" (إيجاد الدومينات الجديدة فقط) ---
      - name: Compare with Previous Results (Find NEW targets only)
        id: diff
        run: |
          touch previous_live_subdomains.txt
          sort live_subdomains.txt > current_live.txt
          sort previous_live_subdomains.txt > previous_live.txt
          comm -23 current_live.txt previous_live.txt > new_targets.txt
          
          echo "NEW_TARGETS_COUNT=$(wc -l < new_targets.txt)" >> $GITHUB_ENV
          echo "Total live targets: $(wc -l < current_live.txt)"
          echo "New targets to scan: $(wc -l < new_targets.txt)"

      # --- الخطوة 7: الفحص الجراحي (Nuclei - على الجديد فقط) ---
      - name: Run Nuclei (on NEW targets only)
        run: |
          if [ ${{ env.NEW_TARGETS_COUNT }} -gt 0 ]; then
            echo "Running Nuclei on ${{ env.NEW_TARGETS_COUNT }} new targets..."
            nuclei -l new_targets.txt -s critical,high,medium -o nuclei_results.txt
            echo "VULNS_FOUND=$(wc -l < nuclei_results.txt)" >> $GITHUB_ENV
          else
            echo "No new targets to scan. Skipping Nuclei."
            echo "VULNS_FOUND=0" >> $GITHUB_ENV
          fi

      # --- الخطوة 8: "العيون البصرية" (gowitness - على الجديد فقط) ---
      - name: Run Visual Recon (gowitness)
        if: env.NEW_TARGETS_COUNT > 0
        run: |
          echo "Taking screenshots of new targets..."
          gowitness file -f new_targets.txt -d gowitness_output --disable-db
          echo "Screenshots saved in 'gowitness_output/screenshots'"

      # --- الخطوة 9: "حاسة السمع" (gospider - على الجديد فقط) ---
      - name: Run JS/Endpoint Mining (gospider)
        if: env.NEW_TARGETS_COUNT > 0
        run: |
          echo "Mining JS files and endpoints..."
          gospider -S new_targets.txt -o gospider_output
          echo "JS/Endpoint data saved in 'gospider_output'"

      # --- الخطوة 10: "الإنذار الفوري" (لكل ثغرة Nuclei) ---
      - name: Send Individual Nuclei Alerts to Telegram
        if: env.VULNS_FOUND > 0
        run: |
          echo "Sending ${{ env.VULNS_FOUND }} vulnerabilities to Telegram..."
          while IFS= read -r vuln; do
            MESSAGE="🚨 VULNERABILITY ALERT 🚨
            **Target:** ${{ env.TARGET_DOMAIN }}
            **Finding:**
            \`\`\`
            $vuln
            \`\`\`"
            
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
            sleep 1
          done < nuclei_results.txt

      # --- الخطوة 11: أرشفة النتايج (السكرين شوتس والـ JS) ---
      - name: Upload Recon Artifacts (Screenshots & JS Maps)
        if: env.NEW_TARGETS_COUNT > 0
        uses: actions/upload-artifact@v4
        with:
          name: V4-Recon-Artifacts
          path: |
            gowitness_output/screenshots/
            gospider_output/
          retention-days: 7

      # --- الخطوة 12: إرسال "تقرير الملخص" ---
      - name: Send Summary Report
        run: |
          if [ ${{ env.VULNS_FOUND }} -gt 0 ]; then
            SUMMARY_MSG="✅ **Scan Complete (V4)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **New Live Targets:** ${{ env.NEW_TARGETS_COUNT }}
            **🚨 Found ${{ env.VULNS_FOUND }} new vulnerabilities!** (Sent individually)
            
            **NEW (Manual Recon):** Screenshots & JS Maps are ready. Go to GitHub Actions to download 'V4-Recon-Artifacts'."
          else
            SUMMARY_MSG="✅ **Scan Complete (V4)**
            **Target:** ${{ env.TARGET_DOMAIN }}
            **New Live Targets:** ${{ env.NEW_TARGETS_COUNT }}
            **No new Nuclei vulnerabilities found.**
            
            **NEW (Manual Recon):** Screenshots & JS Maps are ready. Go to GitHub Actions to download 'V4-Recon-Artifacts'."
          fi
          
          if [ ${{ env.NEW_TARGETS_COUNT }} -gt 0 ]; then
             curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
             -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
             -d text="$SUMMARY_MSG"
          fi

      # --- الخطوة 13: "حفظ الذاكرة" (للمرة الجاية) ---
      - name: Update Previous Results (Save Memory)
        run: |
          rm -f previous_live_subdomains.txt
          mv live_subdomains.txt previous_live_subdomains.txt
          echo "Memory updated for next run."

      # --- الخطوة 14: حفظ الذاكرة في الـ Repo ---
      - name: Commit and Push Memory File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add previous_live_subdomains.txt
          if git diff --staged --quiet; then
            echo "No changes to commit. Memory is up-to-date."
          else
            git commit -m "V4 Bot: Update subdomain memory file"
            git push
          fi
