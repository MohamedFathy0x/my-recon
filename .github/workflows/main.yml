name: V41 - The Surgeon (Precision Radar)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  radar-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. إلغاء الكاش لمنع رسائل التحذير
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install Hunting Arsenal
        run: |
          sudo apt-get update && sudo apt-get install -y jq wget unzip curl
          
          wget -q https://github.com/projectdiscovery/subfinder/releases/download/v2.6.6/subfinder_2.6.6_linux_amd64.zip
          unzip -o -q subfinder_2.6.6_linux_amd64.zip
          sudo mv subfinder /usr/local/bin/
          
          wget -q https://github.com/projectdiscovery/httpx/releases/download/v1.6.0/httpx_1.6.0_linux_amd64.zip
          unzip -o -q httpx_1.6.0_linux_amd64.zip
          sudo mv httpx /usr/local/bin/
          
          go install github.com/tomnomnom/assetfinder@latest
          sudo cp ~/go/bin/assetfinder /usr/local/bin/
          
          rm *.zip

      # 2. تحديد الـ Scope بدقة (شامل كل الـ Assets المسموحة)
      - name: Define Precise Scope
        run: |
          cat <<EOF > scope.txt
          sdworx.com
          auth.sdworx.com
          myaccount.sdworx.com
          app.sdworx.com
          flexincomeplan.com
          myworkandme.com
          huapii.com
          sparc.huapii.com
          skillhunt.huapii.com
          talenthunt.huapii.com
          sdworx.be
          sdworx.cz
          sdworx.dk
          sdworx.de
          sdworx.es
          sdworx.fr
          sdworx.hr
          sdworx.ie
          sdworx.it
          sdworx.lu
          sdworx.hu
          sdworx.nl
          sdworx.no
          sdworx.at
          sdworx.pl
          sdworx.ro
          sdworx.ch
          sdworx.si
          sdworx.rs
          sdworx.fi
          sdworx.se
          sdworx.co.uk
          EOF
          # تنظيف المسافات
          sed -i 's/^[ \t]*//;s/[ \t]*$//' scope.txt
          echo "✅ Scope loaded. Base domains: $(wc -l < scope.txt)"

      - name: Triple-Threat Enumeration (Timeout Protected)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          CHAOS_KEY: ${{ secrets.CHAOS_KEY }}
          SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
          SECURITYTRAILS_TOKEN: ${{ secrets.SECURITYTRAILS_TOKEN }}
        run: |
          subfinder -dL scope.txt -all -silent -o sub1.txt || true
          cat scope.txt | assetfinder --subs-only > sub2.txt || true
          
          cat scope.txt | while read domain; do
            curl -s --max-time 20 "https://crt.sh/?q=%25.$domain&output=json" | jq -r '.[].name_value' 2>/dev/null >> sub3.txt || true
          done
          
          cat scope.txt sub1.txt sub2.txt sub3.txt | tr '[:upper:]' '[:lower:]' | sed 's/\*\.//g' | sort -u > unique_subs.txt

      # 3. الفحص الحي + الفلترة النهائية للتأكد من الـ Scope
      - name: Check Alive & Filter (Strict 5 req/sec)
        run: |
          # فحص البورتات الأساسية والخاصة بالـ Staging
          httpx -l unique_subs.txt -silent \
            -p 80,443,8080,8443,8081,9000,9443 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
            -rl 5 -t 5 \
            -o current_live_raw.txt
          
          # أهم خطوة: التأكد إن الدومين اللي طلع موجود جوه الـ Scope بتاعنا
          touch current_live.txt
          # بنستخدم grep عشان ناخد بس السطور اللي بتطابق نهايات ملف scope.txt
          grep -Ff scope.txt current_live_raw.txt > current_live.txt || true
          
          sort -u current_live.txt -o current_live.txt

      - name: Diff Logic (Extract New)
        run: |
          touch previous_live.txt
          sort previous_live.txt > old_sorted.txt
          
          comm -23 current_live.txt old_sorted.txt > new_domains.txt
          
          NEW_COUNT=$(wc -l < new_domains.txt)
          echo "NEW_COUNT=$NEW_COUNT" >> $GITHUB_ENV

      # 4. التبليغ بملف مرفق (الحل الجذري)
      - name: Send Telegram File Alert
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ env.NEW_COUNT }}" -gt "0" ]; then
            
            MSG="🚨 *SD Worx Radar Alert!*
            🎯 Found ${NEW_COUNT} NEW targets.
            📂 Full list attached below."
            
            # 1. رسالة تنبيه
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
            
            # 2. إرسال الملف (Document)
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
              -F chat_id="$TG_CHAT" \
              -F document=@new_domains.txt \
              -F caption="📄 Full New Domains List ($(date +%F))"
              
          else
            MSG="✅ *Radar Clean.* No new targets today."
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
          fi

      - name: Update Radar Memory
        run: |
          git config --global user.name "Radar Bot"
          git config --global user.email "radar-bot@noreply.com"
          
          git pull origin main --rebase || true
          
          mv current_live.txt previous_live.txt
          
          git add previous_live.txt
          
          if git diff --staged --quiet; then
            echo "No memory changes"
          else
            git commit -m "Radar Update: Cleaned scope baseline"
            git push
          fi
