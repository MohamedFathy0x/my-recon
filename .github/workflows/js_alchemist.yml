name: V18 - The Talkative Alchemist (Guaranteed Report)

on:
  workflow_dispatch:
    inputs:
      URL:
        description: 'Target URL (e.g., https://donorbox.org)'
        required: true

jobs:
  alchemy-job:
    runs-on: ubuntu-latest
    
    steps:
      # 1. التثبيت
      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y coreutils jq wget unzip python3-pip python3-setuptools
          
          # Tools
          wget -q https://github.com/projectdiscovery/katana/releases/download/v1.1.0/katana_1.1.0_linux_amd64.zip
          unzip -o -q katana_1.1.0_linux_amd64.zip
          sudo mv katana /usr/local/bin/

          wget -q https://github.com/projectdiscovery/httpx/releases/download/v1.6.0/httpx_1.6.0_linux_amd64.zip
          unzip -o -q httpx_1.6.0_linux_amd64.zip
          sudo mv httpx /usr/local/bin/

          wget -q https://github.com/lc/gau/releases/download/v2.2.3/gau_2.2.3_linux_amd64.tar.gz
          tar -xzf gau_2.2.3_linux_amd64.tar.gz
          sudo mv gau /usr/local/bin/

          # Python Tools
          git clone https://github.com/m4ll0k/SecretFinder.git secretfinder
          cd secretfinder
          pip3 install -r requirements.txt --break-system-packages
          cd ..

          git clone https://github.com/GerbenJavado/LinkFinder.git linkfinder
          cd linkfinder
          pip3 install -r requirements.txt --break-system-packages
          pip3 install . --break-system-packages
          cd ..
          
          rm *.zip *.tar.gz

      # 2. الجمع
      - name: Harvest JS Files
        run: |
          echo "🧪 Collecting JS from ${{ github.event.inputs.URL }}..."
          mkdir -p /home/runner/
          touch /home/runner/.gau.toml

          # Live
          katana -u ${{ github.event.inputs.URL }} -d 2 -jc -kf all -em js,json -c 5 -o live_js.txt || true
          
          # History
          echo "${{ github.event.inputs.URL }}" | gau --subs --providers wayback,commoncrawl | grep -E "\.js$" > history_js.txt || true
          
          # Merge & Validate
          cat live_js.txt history_js.txt | sort -u > candidates.txt
          httpx -l candidates.txt -mc 200 -silent -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -o valid_js.txt
          
          echo "JS_COUNT=$(wc -l < valid_js.txt)" >> $GITHUB_ENV

      # 3. Source Maps
      - name: Check for Source Maps
        run: |
          if [ -s valid_js.txt ]; then
            touch source_maps_found.txt
            head -n 30 valid_js.txt | while read url; do
              status=$(curl -o /dev/null -s -w "%{http_code}\n" "${url}.map")
              if [ "$status" == "200" ]; then echo "${url}.map" >> source_maps_found.txt; fi
            done
          fi

      # 4. Secrets
      - name: Extract Secrets
        run: |
          if [ -s valid_js.txt ]; then
            touch secrets.txt
            grep -E "AKIA[0-9A-Z]{16}" valid_js.txt >> secrets.txt || true
            grep -E "AIza[0-9A-Za-z_-]{35}" valid_js.txt >> secrets.txt || true
            
            head -n 10 valid_js.txt | while read url; do
              python3 secretfinder/SecretFinder.py -i "$url" -o cli >> temp_secrets.txt || true
            done
            cat temp_secrets.txt | grep -- "->" >> secrets.txt || true
            sort -u secrets.txt > unique_secrets.txt
            echo "SECRETS_COUNT=$(wc -l < unique_secrets.txt)" >> $GITHUB_ENV
          else
            echo "SECRETS_COUNT=0" >> $GITHUB_ENV
          fi

      # 5. Endpoints (توسيع البحث)
      - name: Deep Endpoint Analysis
        run: |
          if [ -s valid_js.txt ]; then
            touch clean_endpoints.txt
            # شغلنا LinkFinder على أول 20 ملف عشان نزود الفرصة
            head -n 20 valid_js.txt | while read url; do
              python3 linkfinder/linkfinder.py -i "$url" -o cli >> raw_links.txt || true
            done
            # تحسين الفلتر عشان يلقط أي مسار يبدأ بـ /
            grep -oE "(\/)[a-zA-Z0-9_?&=\/\-\#\.]+" raw_links.txt | sort -u > clean_endpoints.txt
            echo "ENDPOINTS_COUNT=$(wc -l < clean_endpoints.txt)" >> $GITHUB_ENV
          else
            echo "ENDPOINTS_COUNT=0" >> $GITHUB_ENV
          fi

      # 6. التبليغ الإجباري (Guaranteed Report)
      - name: Send Final Report
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🧪 **JS ALCHEMY REPORT**
          Target: ${{ github.event.inputs.URL }}
          
          📂 JS Files Scanned: ${{ env.JS_COUNT }}
          💎 Secrets Found: ${{ env.SECRETS_COUNT }}
          🗺️ Endpoints Found: ${{ env.ENDPOINTS_COUNT }}
          
          *(Check Artifacts for details)*"
          
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
          -d chat_id="$TG_CHAT" -d text="$MSG" -d parse_mode="Markdown"
          
          # لو فيه أسرار ابعتها
          if [ -s unique_secrets.txt ]; then
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d chat_id="$TG_CHAT" -d text="🔥 **Secrets Preview:** $(head -n 5 unique_secrets.txt)"
          fi
          
          # لو فيه إندبوينتس ابعت الملف
          if [ -s clean_endpoints.txt ]; then
             curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
             -F chat_id="$TG_CHAT" -F document=@"clean_endpoints.txt" -F caption="Endpoints Map"
          fi

      # 7. Artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: V18-Loot
          path: |
            valid_js.txt
            unique_secrets.txt
            clean_endpoints.txt
            source_maps_found.txt
