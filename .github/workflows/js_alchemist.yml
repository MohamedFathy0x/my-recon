name: V65 - The Lone Wolf (Source Build + Safe Mode)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  hunter-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    # لغينا الـ Strategy Matrix عشان نوفر الرصيد ونحل مشكلة الدفع
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. التثبيت من المصدر (اللي إنت بتحبه - 2320 سطر)
      - name: Setup Go & Build Nuclei
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install Nuclei (Full Compilation Log)
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl libpcap-dev bind9-host
          
          echo "🏗️ Building Nuclei from Source (Enjoy the logs)..."
          # الأمر ده هيطلعلك آلاف السطور زي ما طلبت
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          
          sudo cp ~/go/bin/nuclei /usr/local/bin/
          
          # تثبيت المتصفح عشان القوة
          nuclei -install-headless-browser
          nuclei -update-templates
          
          echo "✅ Nuclei Ready. Version:"
          nuclei -version

      # 2. الفحص الذكي (جهاز واحد - وقت محدد)
      - name: Single Wolf Attack
        run: |
          if [ ! -f previous_live.txt ]; then
            echo "⚠️ No targets found."
            exit 0
          fi
          
          DOMAIN_COUNT=$(wc -l < previous_live.txt)
          echo "🐺 Lone Wolf attacking $DOMAIN_COUNT targets..."

          # المعادلة هنا:
          # -max-duration 5h30m: (مهم جداً) بيجبر الأداة تقف بعد 5 ساعات ونص وتبعت التقرير
          # عشان مستحيل جيت هب يقفلهولك تاني وتخسر النتايج
          nuclei -l previous_live.txt \
            -rl 5 -bs 2 -c 2 \
            -severity low,medium,high,critical \
            -timeout 5 \
            -max-duration 5h30m \
            -je results.json \
            -silent || true

          if [ -f results.json ]; then
            cat results.json | jq -r '"[" + .info.severity + "] " + .info.name + " | " + .matched_at' > findings.txt
          fi

      # 3. التبليغ المضمون
      - name: Send Report
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s findings.txt ]; then
            COUNT=$(wc -l < findings.txt)
            
            MSG="🐺 *Lone Wolf Report!*
            ⏳ Scan stopped safely after 5.5 hours.
            🎯 Total Targets: $(wc -l < previous_live.txt)
            💣 Vulnerabilities Found: ${COUNT}
            
            📂 *Report attached.*"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
              -F chat_id="$TG_CHAT" \
              -F document=@findings.txt \
              -F caption="📄 Daily Lone Wolf Report"
          else
            echo "✅ Scan finished (Clean or Time limit reached without findings)."
            # رسالة اطمئنان إن الكود اشتغل
             MSG="🐺 *Lone Wolf Finished.* No vulnerabilities found in this run."
             curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
          fi
