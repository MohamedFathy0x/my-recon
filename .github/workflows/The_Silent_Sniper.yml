name: V45 - The Night Hunter (Full Spectrum)

on:
  schedule:
    - cron: '0 6 * * *' # يعمل يومياً الساعة 6 صباحاً
  workflow_dispatch:    # زرار التشغيل اليدوي

jobs:
  hunter-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read # بيقرا بس، مش محتاج يعدل في الملفات

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. تجهيز البيئة (بدون كاش لتجنب المشاكل)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      # 2. تثبيت القناص (Nuclei)
      - name: Install Nuclei
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl
          
          # تثبيت آخر نسخة من Nuclei
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          
          # تحديث قاعدة بيانات الثغرات (Templates) لآخر لحظة
          ~/go/bin/nuclei -update-templates

      # 3. الفحص الشامل (Low -> Critical)
      - name: Run Full Vulnerability Scan
        run: |
          # التأكد إن ملف الأهداف موجود
          if [ ! -f previous_live.txt ]; then
            echo "⚠️ No target file found form Radar. Skipping scan."
            exit 0
          fi
          
          echo "🚀 Starting Full Scan on SD Worx Targets..."
          
          # إعدادات القنص الدقيق:
          # -severity: ضفنا low بناءً على طلبك
          # -rl 5: السرعة القانونية
          # -bs 2: لتقليل الضغط
          # -etags: بنستبعد ثغرات الـ Network العشوائية عشان نركز في الويب
          
          ~/go/bin/nuclei -l previous_live.txt \
            -rl 5 -bs 2 -c 2 \
            -severity low,medium,high,critical \
            -je results.json \
            -silent
          
          # تنسيق التقرير ليكون سهل القراءة في الملف
          # الشكل هيكون: [Severity] Name -> URL
          if [ -f results.json ]; then
            cat results.json | jq -r '"[" + .info.severity + "] " + .info.name + " | " + .matched_at' > hunter_report.txt
          fi

      # 4. إرسال التقرير (ملف)
      - name: Send Telegram Report
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # لو الملف موجود وفيه داتا
          if [ -s hunter_report.txt ]; then
            
            COUNT=$(wc -l < hunter_report.txt)
            
            MSG="🔥 *Hunter Mission Complete!*
            🎯 Targets Scanned: $(wc -l < previous_live.txt)
            💣 Vulnerabilities Found: ${COUNT}
            (Including Low, Medium, High, Critical)
            
            📂 *Detailed report attached below.*"
            
            # 1. إرسال رسالة التلخيص
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
            
            # 2. إرسال ملف الثغرات الكامل
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
              -F chat_id="$TG_CHAT" \
              -F document=@hunter_report.txt \
              -F caption="📄 Hunter Report ($(date +%F))"
              
          else
            # لو مفيش ثغرات خالص
            MSG="🛡️ *Hunter Finished.*
            Status: Clean. No vulnerabilities found today."
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
          fi
