name: V50 - The Wolf Pack (Parallel Hunter)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  hunter-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    # استراتيجية المصفوفة: تشغيل 5 نسخ من الوظيفة في نفس الوقت
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5] # عدد الأجزاء (ممكن تزودهم لحد 20 لو العدد كبر جداً)
        total_shards: [5]      # لازم يكون نفس عدد الأجزاء اللي فوق

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install Nuclei & Tools
        run: |
          sudo apt-get update && sudo apt-get install -y jq curl parallel
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          ~/go/bin/nuclei -update-templates

      - name: Split Targets & Scan (Shard ${{ matrix.shard }}/${{ matrix.total_shards }})
        run: |
          if [ ! -f previous_live.txt ]; then
            echo "⚠️ No targets found."
            exit 0
          fi

          # تقسيم الملف بناءً على رقم الـ Shard الحالي
          # المعادلة دي بتخلي كل جهاز ياخد مجموعة فريدة من الدومينات
          TOTAL_LINES=$(wc -l < previous_live.txt)
          LINES_PER_SHARD=$(( ($TOTAL_LINES + ${{ matrix.total_shards }} - 1) / ${{ matrix.total_shards }} ))
          START_LINE=$(( (${{ matrix.shard }} - 1) * $LINES_PER_SHARD + 1 ))
          
          # استخراج الجزء الخاص بالجهاز ده
          tail -n +$START_LINE previous_live.txt | head -n $LINES_PER_SHARD > target_shard.txt
          
          echo "🐺 Wolf #${{ matrix.shard }}: Hunting on $(wc -l < target_shard.txt) domains..."

          # الفحص بنفس الإعدادات الآمنة
          ~/go/bin/nuclei -l target_shard.txt \
            -rl 5 -bs 2 -c 2 \
            -severity low,medium,high,critical \
            -timeout 5 \
            -je results_shard.json \
            -silent || true

          # تحويل النتايج لملف نصي
          if [ -f results_shard.json ]; then
            cat results_shard.json | jq -r '"[" + .info.severity + "] " + .info.name + " | " + .matched_at' > findings.txt
          fi

      - name: Send Report (If Vulnerabilities Found)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -s findings.txt ]; then
            COUNT=$(wc -l < findings.txt)
            
            MSG="🐺 *Wolf Pack Hit! (Shard ${{ matrix.shard }})*
            🎯 Scanned: $(wc -l < target_shard.txt) targets
            💣 Found: ${COUNT} Vulnerabilities
            
            📂 *Partial report attached.*"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_CHAT" \
              --data-urlencode text="$MSG" \
              -d parse_mode="Markdown"
            
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
              -F chat_id="$TG_CHAT" \
              -F document=@findings.txt \
              -F caption="📄 Report Shard ${{ matrix.shard }}"
          else
            echo "✅ Shard ${{ matrix.shard }} is clean."
          fi
